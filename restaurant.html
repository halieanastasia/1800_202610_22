<!doctype html>
<html lang="en">
  <head>
    <title>Restaurant</title>
    <meta name="comp1800 team 22" content="My 1800 App" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./styles/style.css" />
  </head>

  <body>
    <div id="navbar-placeholder"></div>

    <article class="restaurant-container">
      <figure class="restaurant-img">
        <figcaption></figcaption>
        <img src="./images/Restaurant_Pictures.png" alt="Restaurant Image" />
      </figure>

      <div class="restaurant-info">
        <h1 id="restaurant-name">Restaurant Name</h1>

        <p>
          <strong>Description</strong><br />
          <span id="restaurant-description">Loading...</span>
        </p>

        <p>
          <strong>Atmosphere</strong><br />
          <span id="restaurant-atmosphere">Loading...</span>
        </p>

        <p>
          <strong>Tags</strong><br />
          <span id="restaurant-tags">Loading...</span>
        </p>

        <p id="restaurant-price">$$$</p>
      </div>
    </article>

    <script type="module" src="./src/main.js"></script>
    <script type="module" src="./src/navbar.js"></script>
    <script type="module" src="./src/restaurants.js"></script>
  </body>
</html>
