<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Location</title>
    <link rel="stylesheet" href="./styles/style.css" />
  </head>

  <body>
    <div id="navbar-placeholder"></div>

    <main class="auth-page">
      <div class="signup-container">
        <h1>Add Restaurant</h1>
        <p>Add a restaurant and include tags for filtering.</p>

        <form id="restaurantForm">
          <div class="form-group">
            <label for="name">Restaurant Name</label>
            <input type="text" id="name" required />
          </div>

          <div class="form-group">
            <label for="address">Address</label>
            <input type="text" id="address" required />
          </div>

          <div class="form-group">
            <label for="city">City</label>
            <input type="text" id="city" placeholder="e.g. Vancouver" />
          </div>

          <div class="form-group">
            <label for="event">Event</label>
            <input type="text" id="event" placeholder="FIFA Watch Party" />
          </div>

          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="text" id="phone" />
          </div>

          <div class="form-group">
            <label for="tags">Tags (comma-separated)</label>
            <input
              type="text"
              id="tags"
              placeholder="e.g. italian, casual, downtown"
            />
          </div>

          <div class="form-group">
            <label for="capacity">Capacity</label>
            <input
              type="number"
              id="capacity"
              min="1"
              step="1"
              required
              placeholder="e.g. 50"
            />
          </div>

          <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description"></textarea>
          </div>

          <button type="submit" class="signup-btn">Submit</button>
        </form>
      </div>
    </main>

    <div id="success-toast">Your location has been added.</div>

    <script type="module" src="./src/main.js"></script>
    <script type="module" src="./src/addrestaurant.js"></script>
    <script type="module" src="./src/protected.js"></script>
  </body>
</html>
