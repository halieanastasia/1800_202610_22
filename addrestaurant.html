<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Location</title>

    <link rel="stylesheet" href="/src/styles/style.css">
</head>

<body>

    <!-- Navbar -->
    <div id="navbar-placeholder"></div>

    <div class="auth-page">

        <div class="signup-container">

            <h2>Add Location</h2>

            <form id="restaurantForm">

                <div class="form-group">
                    <label for="name">Restaurant Name</label>
                    <input type="text" id="name" required>
                </div>

                <div class="form-group">
                    <label for="address">Address</label>
                    <input type="text" id="address" required>
                </div>

                <div class="form-group">
                    <label for="event">Event</label>
                    <input type="text" id="event" placeholder="FIFA Watch Party">
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="text" id="phone">
                </div>

                <div class="form-group">
                    <label for="capacity">Capacity</label>
                    <input type="number" id="capacity" min="1" step="1" required placeholder="e.g. 50"
                        title="Minimum capacity is 1 person" />
                    <small class="error-text" style="color: #e74c3c; display: none;">
                        Please enter a number
                    </small>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description"></textarea>
                </div>

                <button type="submit" class="signup-btn">Submit</button>

            </form>

        </div>

    </div>

    <script type="module" src="/src/main.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const capacityInput = document.getElementById('capacity');

            // Just for prevent typing invalid characters: -, ., e, E
            capacityInput.addEventListener('keydown', (e) => {
                if (['-', '.', 'e', 'E'].includes(e.key)) {
                    e.preventDefault();
                }
            });

            // Clean up invalid input
            capacityInput.addEventListener('input', (e) => {
                let val = e.target.value;

                // Allow empty temporarily
                if (val === '') return;

                // Remove any non-digits and leading zeros
                let cleaned = val.replace(/[^0-9]/g, '').replace(/^0+/, '');

                if (cleaned === '') {
                    e.target.value = '';
                    return;
                }

                const num = parseInt(cleaned, 10);

                // If less than 1, maybe reset to empty or keep previous valid value
                if (num < 1) {
                    e.target.value = '';
                } else {
                    e.target.value = num; // keep it clean integer
                }
            });

            // Show error message when user leaves the field because it is required
            capacityInput.addEventListener('blur', (e) => {
                const val = e.target.value.trim();
                const errorEl = e.target.nextElementSibling;

                if (val !== '' && (isNaN(val) || Number(val) < 1)) {
                    e.target.value = '';
                    if (errorEl && errorEl.classList.contains('error-text')) {
                        errorEl.style.display = 'block';
                    }
                } else {
                    if (errorEl) errorEl.style.display = 'none';
                }
            });
        });
    </script>

    <div id="success-toast">Your Location has been added</div>

</body>

</html>
