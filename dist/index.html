<body id="map-body">
  <div id="map-container">
    <div id="map-search-bar">
      <!--Event searchbar-->
      <input id="event-search-input" type="text" class="search-input" placeholder="Search for a event" />

      <!--Filter Pop Up Button-->
      <button id="filter-button" class="btn btn-primary" type="button">
        Filters
      </button>

      <!--Reset Pop Up Button-->
      <button id="reset-button" class="btn btn-primary" type="button">
        Reset
      </button>
    </div>

    <!--Added popups-container w/ overflow-y:auto so popups can scroll-->
    <div id="popups-container">
      <!--Results Pop Up-->
      <div id="search-result-popup">
        <div class="results-header">
          <h2 class="results-title">Results</h2>
          <span id="results-count" class="results-count">0 events</span>
        </div>
        <div id="results-list" class="results-list"></div>
      </div>
      <!--Filter Pop Up-->
      <div id="map-filter-popup">
        <div class="tag-panel">
          <button id="toggle-tag-btn" class="tag-toggle-btn" type="button">
            Filter by tag
            <span id="tag-toggle-icon">▼</span>
          </button>

          <div id="tag-filter-wrapper" class="tag-filter-wrapper collapsed">
            <div id="tag-filter-container" class="tag-filter-container"></div>
          </div>
        </div>
        <div id="tag-position-hotfix"></div>
      </div>
    </div>

    <div id="map"></div>
  </div>
  <div id="navbar-placeholder" class="map-navbar"></div>

  <script src="https://unpkg.com/@maplibre/maplibre-gl-geocoder@1.5.0/dist/maplibre-gl-geocoder.min.js"></script>
</body>
