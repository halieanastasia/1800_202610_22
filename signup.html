<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Sign Up for Watching Party Member</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles/style.css" />
</head>

<body class="auth-page">
  <div class="signup-container">
    <h2>Create Account</h2>
    <p>Join the Watching Party and never miss the big match in Vancouver</p>

    <form action="dashboard.html" method="POST">
      <div class="form-group">
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required />
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Create a password" required />
      </div>

      <div class="form-group">
        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" name="confirm" placeholder="Confirm your password" required />
      </div>

      <button type="submit" class="signup-btn">Sign Up</button>
    </form>

    <div class="login-link">
      Already have an account? <a href="login.html">Login</a>
    </div>

    <div>
      <a class="home-button" href="index.html">Home</a>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
