<!doctype html>
<html lang="en">

<head>
  <title>FIFA Spot Map</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="comp1800 team 22" content="Restaurant map page" />
  <link rel="stylesheet" href="./styles/style.css" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
</head>

<body id="map-body">
  <div id="map-container">
    <div id="map-search-bar">
      <!--Restaurant searchbar-->
      <input id="restaurant-search-input" type="text" class="search-input" placeholder="Search for a restaurant" />

      <!--Filter Pop Up Button-->
      <button id="filter-button" class="btn btn-primary" type="button">
        Filters
      </button>

      <!-- <div id="filter-button">
          <img src="./images/filter.png" />
        </div> -->

      <!--Search Button-->
      <!-- <button id="search-button" class="btn btn-primary" type="button">
          Search
        </button> -->

      <!--Reset Button-->
      <!-- <button id="reset-button" class="btn btn-outline-light" type="button">
          Reset
        </button> -->
    </div>

    <div id="map-filter-popup">
      <label for="place-search-input" class="search-label">
        Address / place search
      </label>
      <input id="place-search-input" type="text" class="search-input" placeholder="e.g. BCIT Burnaby, Vancouver" />

      <div class="search-actions">
        <button id="search-btn" class="btn btn-primary" type="button">
          Search
        </button>
        <button id="use-my-location-btn" class="btn btn-outline-light" type="button">
          Use My Location
        </button>
        <button id="reset-btn" class="btn btn-outline-light" type="button">
          Reset
        </button>
      </div>

      <div class="distance-filter">
        <label class="search-label">Quick distance filters</label>
        <div class="quick-distance-buttons">
          <button type="button" class="quick-distance-btn" data-distance="1">
            1 km
          </button>
          <button type="button" class="quick-distance-btn" data-distance="3">
            3 km
          </button>
          <button type="button" class="quick-distance-btn" data-distance="5">
            5 km
          </button>
        </div>
      </div>

      <div class="distance-filter">
        <label for="distance-range-input" class="search-label">
          Distance radius (km)
        </label>
        <input id="distance-range-input" type="number" class="distance-number-input" min="1" max="50" step="1" value="1"
          placeholder="Enter distance in km" />
        <small id="distance-helper-text" class="distance-helper-text">
          Click “Use My Location” to start with a 1 km radius.
        </small>
      </div>

      <div class="search-actions">
        <button id="show-all-btn" class="btn btn-outline-light" type="button">
          Show All
        </button>
      </div>

      <div class="tag-panel">
        <button id="toggle-tag-btn" class="tag-toggle-btn" type="button">
          Filter by tag
          <span id="tag-toggle-icon">▼</span>
        </button>

        <div id="tag-filter-wrapper" class="tag-filter-wrapper collapsed">
          <div id="tag-filter-container" class="tag-filter-container"></div>
        </div>
      </div>
    </div>

    <div id="search-result-popup">
      <div class="results-header">
        <h2 class="results-title">Results</h2>
        <span id="results-count" class="results-count">0 restaurants</span>
      </div>

      <div id="results-list" class="results-list"></div>
    </div>

    <div id="map"></div>
  </div>
  <div id="navbar-placeholder" class="map-navbar"></div>

  <script type="module" src="./src/main.js"></script>
  <script type="module" src="./src/map.js"></script>
  <script type="module" src="./src/events.js"></script>
</body>

</html>
