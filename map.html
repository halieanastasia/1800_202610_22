<!doctype html>
<html lang="en">
  <head>
    <title>FIFA Spot Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="comp1800 team 22" content="Restaurant map page" />
  </head>

  <body id="map-body">
    <div id="navbar-placeholder"></div>

    <main class="map-layout">
      <section class="map-sidebar">
        <h1 class="page-title">Find Restaurants</h1>
        <p class="page-subtitle">
          Search restaurants, filter by tag, and find places near an address or your current location.
        </p>

        <div class="search-panel">
          <label for="restaurant-search-input" class="search-label">
            Restaurant search
          </label>
          <input
            id="restaurant-search-input"
            type="text"
            class="search-input"
            placeholder="e.g. sushi, pub, sports bar"
          />

          <label for="place-search-input" class="search-label">
            Address / place search
          </label>
          <input
            id="place-search-input"
            type="text"
            class="search-input"
            placeholder="e.g. BCIT Burnaby, Vancouver"
          />

          <div class="search-actions">
            <button id="search-btn" class="btn btn-primary" type="button">
              Search
            </button>
            <button id="use-my-location-btn" class="btn btn-outline-light" type="button">
              Use My Location
            </button>
            <button id="reset-btn" class="btn btn-outline-light" type="button">
              Reset
            </button>
          </div>

          <div class="distance-filter">
            <label class="search-label">Quick distance filters</label>
            <div class="quick-distance-buttons">
              <button type="button" class="quick-distance-btn" data-distance="1">1 km</button>
              <button type="button" class="quick-distance-btn" data-distance="3">3 km</button>
              <button type="button" class="quick-distance-btn" data-distance="5">5 km</button>
            </div>
          </div>

          <div class="distance-filter">
            <label for="distance-range-input" class="search-label">
              Distance radius (km)
            </label>
            <input
              id="distance-range-input"
              type="number"
              class="distance-number-input"
              min="1"
              max="50"
              step="1"
              value="1"
              placeholder="Enter distance in km"
            />
            <small id="distance-helper-text" class="distance-helper-text">
              Click “Use My Location” to start with a 1 km radius.
            </small>
          </div>

          <div class="search-actions">
            <button id="show-all-btn" class="btn btn-outline-light" type="button">
              Show All
            </button>
          </div>
        </div>

        <div class="tag-panel">
          <button id="toggle-tag-btn" class="tag-toggle-btn" type="button">
            Filter by tag
            <span id="tag-toggle-icon">▼</span>
          </button>

          <div id="tag-filter-wrapper" class="tag-filter-wrapper collapsed">
            <div id="tag-filter-container" class="tag-filter-container"></div>
          </div>
        </div>

        <div class="results-header">
          <h2 class="results-title">Results</h2>
          <span id="results-count" class="results-count">0 restaurants</span>
        </div>

        <div id="results-list" class="results-list"></div>
      </section>

      <section class="map-section">
        <div id="map"></div>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
    <script type="module" src="./src/map.js"></script>
  </body>
</html>
