<!doctype html>
<html lang="en">

<head>
  <title>Map</title>
  <meta name="comp1800 template" content="My 1800 App" />

  <!-- Required meta tags -->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Web Components for shared navbar and footer layout -->
  <script type="module" src="./src/navbar.js"></script>
</head>

<body id="map-body">
  <!------------------------------>
  <!-- Your HTML Layout go here -->
  <!------------------------------>

  <!-- our own navbar goes here -->
  <!-- our own footer goes here -->
  <div id="map-page" style="position: relative;">
    <div id="map"></div>

    <button type="button" id="add-event-btn" class="btn btn-primary rounded-pill shadow" data-bs-toggle="modal"
      data-bs-target="#eventModal">
      Add an Event
    </button>
    <h2 class="map-title">Restaurants Streaming FIFA Games</h2>
    <div id="navbar-placeholder" class="map-navbar"></div>
  </div>
  <div class="modal fade" id="eventModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Add FIFA Stream Event</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="event-form">
            <div class="mb-3">
              <label class="form-label">Restaurant Name</label>
              <input type="text" class="form-control" id="rest-name" placeholder="Enter name" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Description</label>
              <textarea class="form-control" id="event-desc" rows="3"
                placeholder="Special deals, screen size, etc."></textarea>
            </div>

            <div class="mb-3">
              <label class="form-label">Time & Date</label>
              <input type="datetime-local" class="form-control" id="event-time" required>
            </div>

            <div class="row">
              <div class="col-6 mb-3">
                <label class="form-label">Capacity</label>
                <input type="number" class="form-control" id="capacity" placeholder="e.g. 50">
              </div>
              <div class="col-6 mb-3">
                <label class="form-label">Parking</label>
                <select class="form-select" id="parking">
                  <option value="Available">Available</option>
                  <option value="Street Only">Street Only</option>
                  <option value="None">None</option>
                </select>
              </div>
            </div>

            <div class="form-check mb-3">
              <input class="form-check-input" type="checkbox" id="kids-friendly">
              <label class="form-check-label">Kids Welcome?</label>
            </div>

            <button type="submit" class="btn btn-success w-100">Save Event</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!---------------------------------------------->
  <!-- Your own JavaScript scripts go here      -->
  <!---------------------------------------------->

  <script type="module" src="./src/main.js"></script>
  <script type="module" src="./src/map.js"></script>
</body>

</html>
