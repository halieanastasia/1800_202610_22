<!doctype html>
<html lang="en">

<head>
  <title>FIFA StrEATS</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./styles/style.css" />

  <link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/@maplibre/maplibre-gl-geocoder@1.5.0/dist/maplibre-gl-geocoder.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/@maplibre/maplibre-gl-geocoder@1.5.0/dist/maplibre-gl-geocoder.css"
    type="text/css" />
</head>

<body>
  <div id="navbar-placeholder"></div>

  <main class="container mt-4">
    <ul class="nav nav-tabs" id="eventTabs" role="tablist">
      <li class="nav-item">
        <button class="nav-link active" id="all-tab" data-bs-toggle="tab" data-bs-target="#all-events" type="button">All
          Events</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" id="my-tab" data-bs-toggle="tab" data-bs-target="#my-events" type="button">My
          Events</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" id="fav-tab" data-bs-toggle="tab" data-bs-target="#fav-events"
          type="button">Favorites</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" id="create-tab" data-bs-toggle="tab" data-bs-target="#create-event-panel"
          type="button">Create Event</button>
      </li>
    </ul>

    <div class="tab-content p-3" id="eventTabsContent">

      <div class="tab-pane fade show active" id="all-events" role="tabpanel">
        <div id="results-list" class="event-grid mt-3"></div>
      </div>

      <div class="tab-pane fade" id="my-events" role="tabpanel">
        <div id="my-results-list" class="event-grid mt-3"></div>
      </div>

      <div class="tab-pane fade" id="fav-events" role="tabpanel">
        <div id="fav-results-list" class="event-grid mt-3">
          <p class="text-muted">No favorites yet.</p>
        </div>
      </div>

      <div class="tab-pane fade" id="create-event-panel" role="tabpanel">
        <div class="card shadow-sm mt-3">
          <div class="card-body">
            <h5 class="card-title mb-4">Event Details</h5>

            <form id="event-form">
              <div class="mb-3">
                <label for="event-name" class="form-label">Event Name</label>
                <input type="text" id="event-name" class="form-control" placeholder="Enter name" required>
              </div>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label">Search Address</label>
                  <div id="addressSearch"></div>
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label">Selected Address</label>
                  <input type="text" id="address" class="form-control" readonly>
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label">Map Location</label>
                <div id="formMap" style="height: 300px; width: 100%; border-radius: 8px;"></div>
              </div>

              <div class="mb-3">
                <label for="event-desc" class="form-label">Description</label>
                <textarea id="event-desc" class="form-control" rows="3"
                  placeholder="Deals, screen size, etc."></textarea>
              </div>

              <div class="mb-3 border p-3 rounded bg-light">
                <label class="form-label d-block fw-bold">Streaming FIFA Match?</label>
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="isStreaming" id="stream-yes" value="true">
                  <label class="form-check-label" for="stream-yes">Yes</label>
                </div>
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="isStreaming" id="stream-no" value="false" checked>
                  <label class="form-check-label" for="stream-no">No</label>
                </div>

                <div class="mt-3 d-none" id="match-section">
                  <label for="fifa-match" class="form-label">Tournament Stage</label>
                  <select id="fifa-match" class="form-select">
                    <option value="" selected disabled>Select stage...</option>
                    <option value="Group Stage">Group Stage</option>
                    <option value="Round of 16">Round of 16</option>
                    <option value="Quarter-Finals">Quarter-Finals</option>
                    <option value="Semi-Finals">Semi-Finals</option>
                    <option value="Finals">Finals</option>
                  </select>
                </div>
              </div>

              <div class="mb-3">
                <label for="event-time" class="form-label">Time & Date</label>
                <input type="datetime-local" id="event-time" class="form-control" required>
              </div>

              <div class="form-check mb-2">
                <input type="checkbox" id="pet-friendly" class="form-check-input">
                <label for="pet-friendly" class="form-check-label">Pet Friendly?</label>
              </div>

              <div class="form-check mb-4">
                <input type="checkbox" id="kids-friendly" class="form-check-input">
                <label for="kids-friendly" class="form-check-label">Kids Welcome?</label>
              </div>

              <button type="submit" class="btn btn-success w-100 py-2">Save Event</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script type="module" src="./src/main.js"></script>
  <script type="module" src="./src/navbar.js"></script>
  <script type="module" src="./src/events.js"></script>
</body>

</html>
