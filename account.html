<!doctype html>
<html lang="en">

<head>
  <title>Account</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./styles/style.css" />
</head>

<body>
  <div id="navbar-placeholder"></div>

  <main class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-8 text-center">

        <h2 class="mb-4">My Account</h2>

        <div class="bg-white text-dark p-4 p-md-5 rounded shadow-sm border mx-auto" style="max-width: 500px;">
          <h1 class="display-6 fw-bold text-center">
            Welcome, <span id="name-goes-here" class="d-inline-block text-break">friend</span>
          </h1>

          <hr class="my-4">

          <div class="d-flex flex-column flex-sm-row justify-content-center gap-2 mb-4">
            <button type="button" class="btn btn-success px-4" id="edit-profile-btn">
              Edit Profile
            </button>
            <button type="button" class="btn btn-danger px-4" id="logout-button">
              Log Out
            </button>
          </div>

          <div id="security-section" class="d-none text-start mt-4 border-top pt-3">

            <div class="mb-3">
              <label class="small fw-bold text-muted mb-1">Email Address</label>
              <div class="input-group">
                <input type="email" id="acc-email" class="form-control" readonly>
                <button class="btn btn-outline-secondary" id="edit-email-btn">Change</button>
              </div>
            </div>

            <div class="mb-3">
              <label class="small fw-bold text-muted mb-1">Security</label>
              <div>
                <button type="button" class="btn btn-outline-secondary btn-sm" id="edit-pass-btn">
                  Change Password
                </button>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>

    </div>
    </div>
  </main>

  <script type="module" src="./src/main.js"></script>
  <script type="module" src="./src/navbar.js"></script>
  <script type="module" src="./src/protected.js"></script>
  <script type="module" src="./src/account.js"></script>
</body>

</html>
